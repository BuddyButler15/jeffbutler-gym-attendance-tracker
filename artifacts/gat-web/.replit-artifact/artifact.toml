kind = "web"
previewPath = "/"
title = "Gym Attendance Tracker"
version = "1.0.0"
id = "artifacts/gat-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24971

[services.development]
run = "pnpm --filter @workspace/gat-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gat-web", "run", "build" ]
publicDir = "artifacts/gat-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24971"
BASE_PATH = "/"
