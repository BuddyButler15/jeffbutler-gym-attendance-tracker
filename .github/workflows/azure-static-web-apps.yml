name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm --filter @workspace/gat-web run build
        env:
          BASE_PATH: /
          PORT: 3000
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Deploy via SWA CLI
        run: npx --yes @azure/static-web-apps-cli deploy artifacts/gat-web/dist/public --env production --deployment-token ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        timeout-minutes: 30
